<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaloguj się</title>
    <script type="module" src="/src/login.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-100">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">Logowanie</h1>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1" for="email">Email</label>
                <input type="email" id="email" required class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="password">Hasło</label>
                <input type="password" id="password" required class="w-full border border-gray-300 p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div id="error-message" class="text-red-500 text-sm hidden"></div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded font-medium transition-colors duration-200">
                Zaloguj się
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-gray-500 hover:text-indigo-600 transition-colors">← Powrót do strony głównej</a>
        </div>
    </div>

</body>
</html>
